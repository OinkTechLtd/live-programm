<script>
const params  = new URLSearchParams(location.search);
const stream  = params.get("stream") || "";
const chId    = params.get("ch") || "";

// Цепочка PlayerJS источников — твои репозитории приоритетом
const PLAYERJS_SRCS = [
  "https://raw.githubusercontent.com/OinkTechLtd/rulive/main/playerjs.js",
  "https://raw.githubusercontent.com/oinktechllc/cdnplayerjs/main/playerjs.js",
  "https://twixoffltdco.github.io/cdnplayerjs/playerjs.js",
  "https://cdn.jsdelivr.net/npm/playerjs@0.0.12/dist/player.js",
];

function showError(msg){
  document.getElementById("player").innerHTML = `
    <div class="err">
      <div class="err-icon">📡</div>
      <div>${msg}</div>
      <div class="err-msg">Попробуй другой источник или проверь ссылку</div>
    </div>`;
}

function loadHLS(url){
  // Грузим hls.js и запускаем напрямую
  const script = document.createElement("script");
  script.src = "https://cdn.jsdelivr.net/npm/hls.js@latest/dist/hls.min.js";
  script.onload = ()=>{
    const container = document.getElementById("player");
    container.innerHTML = "";
    const video = document.createElement("video");
    video.style.cssText = "width:100%;height:100%;background:#000";
    video.controls = true;
    video.autoplay = true;
    video.playsInline = true;
    container.append(video);

    if(Hls.isSupported()){
      const hls = new Hls({ enableWorker:true, lowLatencyMode:true });
      hls.loadSource(url);
      hls.attachMedia(video);
      hls.on(Hls.Events.MANIFEST_PARSED, ()=>{ video.play().catch(()=>{}); });
      hls.on(Hls.Events.ERROR, (e,d)=>{
        if(d.fatal) showError("Поток недоступен или заблокирован");
      });
    } else if(video.canPlayType("application/vnd.apple.mpegurl")){
      // Safari
      video.src = url;
      video.play().catch(()=>{});
    } else {
      showError("HLS не поддерживается в этом браузере");
    }
  };
  script.onerror = ()=> showError("Не удалось загрузить плеер");
  document.head.append(script);
}

function tryPlayerJS(srcs, url){
  if(!srcs.length){ loadHLS(url); return; }
  const s = document.createElement("script");
  s.src = srcs[0];
  s.onload = ()=>{
    if(typeof Playerjs !== "undefined"){
      new Playerjs({
        id:    "player",
        file:  url,
        autoplay: 1,
      });
    } else {
      tryPlayerJS(srcs.slice(1), url);
    }
  };
  s.onerror = ()=> tryPlayerJS(srcs.slice(1), url);
  document.head.append(s);
}

if(!stream){
  showError("Ссылка на поток не указана");
} else {
  tryPlayerJS(PLAYERJS_SRCS, stream);
}
</script>
