name: Update Schedule

on:
  schedule:
    - cron: '0 */3 * * *'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Install dependencies
        run: |
          pip install requests beautifulsoup4 python-dateutil
          
      - name: Run parser
        run: |
          # Переходим в папку проекта если она есть, иначе запускаем из корня
          if [ -d "live-programm" ]; then
            python live-programm/scripts/parser.py
          else
            python scripts/parser.py
          fi
        
      - name: Commit and push if changed
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add live-programm/data/schedule.json || git add data/schedule.json
          git commit -m "Update schedule" || exit 0
          git push
