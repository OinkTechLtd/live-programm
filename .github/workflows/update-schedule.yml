name: Update TV Schedule

on:
  schedule:
    - cron: '0 */3 * * *'
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          cd scraper
          pip install -r requirements.txt

      - name: Run scraper
        run: |
          cd scraper
          python scraper.py

      - name: Commit & push updated schedule
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add data/schedule.json
          git commit -m "chore: update schedule" || echo "No changes"
          git push
