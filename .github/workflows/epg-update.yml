name: 🤖 EPG Robot — Обновление расписания

on:
  schedule:
    # Каждые 3 часа
    - cron: '0 */3 * * *'
  workflow_dispatch:
    inputs:
      force:
        description: 'Принудительное обновление'
        required: false
        default: 'false'
  push:
    branches: [main]
    paths:
      - 'scripts/**'
      - '.github/workflows/**'

jobs:
  update-epg:
    name: 📡 Поисковой робот EPG
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: 📥 Клонируем репозиторий
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: 🐍 Настраиваем Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: 📦 Устанавливаем зависимости
        run: pip install -r requirements.txt

      - name: 🔍 Запускаем поискового робота EPG
        run: python scripts/epg_robot.py
        env:
          TZ: 'Europe/Moscow'

      - name: 📊 Статистика обновления
        run: |
          echo "📅 Время: $(TZ=Europe/Moscow date)"
          echo "📁 Файлы данных:"
          ls -lh data/ 2>/dev/null || echo "нет файлов"
          echo "📺 Каналов:"
          python -c "import json; d=json.load(open('data/schedule.json', encoding='utf-8')); print(len(d['channels']), 'каналов')"

      - name: 💾 Коммитим обновление
        run: |
          git config user.name "EPG Robot 🤖"
          git config user.email "epg-robot@live-programm.local"
          git add data/
          git diff --staged --quiet && echo "Изменений нет" && exit 0
          TIMESTAMP=$(TZ=Europe/Moscow date '+%d.%m.%Y %H:%M МСК')
          CHANNELS=$(python -c "import json; d=json.load(open('data/schedule.json', encoding='utf-8')); print(len(d['channels']))")
          git commit -m "🤖 EPG обновление: ${TIMESTAMP} | ${CHANNELS} каналов"
          git push
